apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "chroma-memory-mcp.fullname" . }}-chromadb-data
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chroma-memory-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: chromadb
spec:
  accessModes:
    - {{ .Values.chromadb.persistence.accessMode }}
  {{- if .Values.chromadb.persistence.storageClass }}
  storageClassName: {{ .Values.chromadb.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.chromadb.persistence.size }}
